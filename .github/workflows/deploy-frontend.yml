name: Deploy Frontend to VDS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: 22
          script: |
            echo "🔍 Debug: Starting deployment..."
            echo "User: $(whoami)"
            echo "Home: $HOME"
            echo "PWD: $(pwd)"
            
            echo ""
            echo "📁 Checking /opt/myapp/frontend:"
            ls -la /opt/myapp/frontend/ || echo "❌ NOT FOUND!"
            
            echo ""
            echo "📁 Checking /opt/myapp/docker-compose.yml:"
            ls -la /opt/myapp/docker-compose.yml || echo "❌ NOT FOUND!"
            
            echo ""
            echo "🔧 Starting deployment..."
            
            # Переходим в папку фронтенда
            cd /opt/myapp/frontend
            echo "✅ Now in: $(pwd)"
            
            # Обновляем код
            git pull origin main
            
            # Переходим в корень проекта
            cd /opt/myapp
            
            # Собираем и запускаем
            docker compose build --no-cache frontend
            docker compose up -d frontend
            
            # Чистим старые образы
            docker image prune -f
            
            echo ""
            echo "✅ Deployment completed!"