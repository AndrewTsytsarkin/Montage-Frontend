name: Deploy Frontend to VDS

on:
 
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          port: 22
          command_timeout: 5m
          script: |
            echo "=== DEPLOY STARTED: $(date) ==="
            
            echo ">>> Step 1/4: Git pull"
            cd /opt/myapp/frontend
            git pull origin main
            echo "✅ Git pull done at $(date +%T)"
            
            echo ">>> Step 2/4: Docker build (CI=true)"
            cd /opt/myapp
            CI=true docker compose build frontend
            echo "✅ Docker build done at $(date +%T)"
            
            echo ">>> Step 3.0/4: Docker compose DOWN"
            docker compose down
            echo "✅ Docker compose DOWN at $(date +%T)"


            echo ">>> Step 3.1/4: Docker up"
            docker compose up -d frontend
            echo "✅ Docker up done at $(date +%T)"
            
            echo ">>> Step 4/4: Cleanup"
            docker image prune -f --filter "until=24h"
            echo "✅ Cleanup done at $(date +%T)"
            
            echo "=== DEPLOY COMPLETED: $(date) ==="